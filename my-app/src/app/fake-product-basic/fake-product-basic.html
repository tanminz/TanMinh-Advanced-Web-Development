<p *ngIf="errorMessage">{{ errorMessage }}</p>

<table border="1" *ngIf="products$ | async as data">
  <thead>
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>Description</th>
      <th>Price</th>
      <th>Category</th>
      <th>Image</th>
      <th>Rating</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let p of data">
      <td>{{ p.id }}</td>
      <td>{{ p.title }}</td>
      <td>{{ p.description }}</td>
      <td>${{ p.price }}</td>
      <td>{{ p.category }}</td>
      <td>
        <img [src]="p.image" width="250" height="250" alt="">
      </td>
      <td>{{ p.rating.rate }} / {{ p.rating.count }}</td>
    </tr>
  </tbody>
</table>
