<div class="ex63-products">
  <section class="page-header">
    <h1 class="page-title">Products</h1>
    <button class="btn btn-cart" (click)="goToCart()">Shopping Cart</button>
  </section>
  @if (loading) {
    <p class="loading-text">Loading products...</p>
  } @else {
    <div class="product-grid">
      @for (p of products; track p._id) {
        <div class="product-card">
          <div class="product-img-wrap">
            <img [src]="p.image || 'assets/placeholder.png'" [alt]="p.name">
          </div>
          <div class="product-body">
            <h3 class="product-name">{{ p.name }}</h3>
            <p class="product-price">${{ p.price | number:'1.2-2' }}</p>
            <button class="btn btn-add" (click)="addToCart(p)">ADD TO CART</button>
          </div>
        </div>
      }
    </div>
  }
</div>
